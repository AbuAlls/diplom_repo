services:
  db:
    image: postgres:17.2-bookworm
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"] # JetStream on (optional)
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 4222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null 2>&1 || exit 1"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 30

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - miniodata:/data
    # ВАЖНО: healthcheck убран намеренно.
    # В образе minio нет curl/wget, из-за чего healthcheck "ломается" и контейнер становится unhealthy,
    # хотя сервис реально работает 100/100

  # One-shot init: wait for MinIO, then create bucket
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      i=0;
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do
        i=$$((i+1));
        echo "waiting for minio... attempt=$$i";
        sleep 1;
      done;
      mc mb -p local/${S3_BUCKET} || true;
      mc anonymous set none local/${S3_BUCKET} || true
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    working_dir: /workspace
    volumes:
      - ./:/workspace:cached
    # user: "${UID}:${GID}" dev container конфликт, vscode usr vs orig user
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: ["sleep", "infinity"] # dev
    # command: ["sh", "-lc", "go test ./... && go run ./cmd/api"] # prod

volumes:
  pgdata:
  miniodata:
